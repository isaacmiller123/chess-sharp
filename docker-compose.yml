# One-command host for the Chess# web app (deploy guide: docs/WEB-DEPLOY.md).
#
#   docker compose up --build -d
#   → http://localhost:8080
#
# Data layout on the host:
#   ./data-web          accounts DB + per-user game DBs (BACK THIS UP — it is
#                       the only stateful thing; gitignored)
#   ./resources/data    puzzles.sqlite (optional, read-only; grab it with
#                       `npm run setup:puzzles && npm run build:puzzles` or copy
#                       it from a dev machine). Missing file = puzzle features
#                       honestly report "not installed"; everything else works.
services:
  web:
    build: .
    image: chess-sharp-web
    ports:
      - '8080:8080'
    volumes:
      # DATA_DIR (the image sets DATA_DIR=/data)
      - ./data-web:/data
      # Puzzle DB stays OUTSIDE the image by default (2.1 GB) — see Dockerfile
      # for the optional bake-in build.
      - ./resources/data:/puzzles:ro
    environment:
      PUZZLES_PATH: /puzzles/puzzles.sqlite
      # The documented deployment (docs/WEB-DEPLOY.md) puts a TLS-terminating
      # reverse proxy in front: trust its X-Forwarded-* headers so rate
      # limiting sees real client IPs and X-Forwarded-Proto marks the session
      # cookie Secure. REMOVE this line if you expose port 8080 directly to
      # the internet instead — direct clients could spoof those headers.
      TRUST_PROXY: '1'
      # The image runs NODE_ENV=production, so the session cookie defaults to
      # Secure. For plain-http local hosting, Chrome/Firefox still accept it
      # on http://localhost; Safari does not — uncomment for local Safari:
      # COOKIE_SECURE: '0'
      # LOG_LEVEL: debug
    restart: unless-stopped
