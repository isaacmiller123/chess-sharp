name: build

# Builds the desktop app for macOS and Windows.
#
# Triggers:
#   - workflow_dispatch — manual run from the Actions tab (any branch).
#   - push of a v* tag  — e.g. `git tag v0.1.0 && git push origin v0.1.0`.
#
# Each matrix leg runs on its own OS (electron-builder cannot cross-compile the
# native installers), installs deps, typechecks, builds the renderer/main bundles,
# then packages with electron-builder for THAT platform only. Nothing is published
# to a GitHub release automatically (`--publish never`); the packaged installers are
# uploaded as workflow artifacts you can download and attach to a release yourself.
#
# No code signing: the mac build is unsigned (electron-builder.yml sets identity:
# null) and the win build is unsigned too. Users clear Gatekeeper / SmartScreen
# manually on first run — see the README "unsigned build" caveats.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Let a newer run for the same ref cancel an in-flight one.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# `contents: write` lets the tag build attach the installers to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # One failing OS should not abort the other — you still get the build that
      # did succeed as an artifact.
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (renderer + main)
        run: npm run build

      # Cross-platform congruence gate: the pure-node game/platform suites run on
      # BOTH OS legs (they need no engine binaries or display — headless esbuild
      # bundles). Engine-dependent suites (bots-ui live probes) stay local-only.
      - name: Game & platform suites
        shell: bash
        run: |
          for t in test-games-kernel test-ffish-games test-go test-checkers \
                   test-small-games test-custom-variants test-mp test-mp-store \
                   test-est-elo test-ratings-integrity test-manuals test-board3d \
                   test-cg-keys test-custom-board-keys test-flip \
                   test-games-archive test-settings-persist; do
            echo "== $t =="; node scripts/$t.mjs
          done

      # Package for the current OS only. electron-builder auto-selects the win/mac
      # target block from electron-builder.yml based on the runner. --publish never
      # keeps it from touching any GitHub release. The datasets (engine + puzzle DB)
      # are NOT bundled — they import at runtime — so no large downloads happen here.
      - name: Package (electron-builder)
        run: npx electron-builder --publish never
        env:
          # Belt-and-suspenders: prevent electron-builder from attempting any
          # code-signing/notarization on either OS in CI (builds stay unsigned).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Upload only the distributable artifacts, not the unpacked app trees. The
      # globs cover: Windows Chess-Setup-*.exe / Chess-Portable-*.exe / Chess-*.zip
      # and macOS Chess-*.dmg / Chess-*.zip, plus the build metadata files.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chess-sharp-${{ matrix.os }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

      # Tag builds also publish the installers as GitHub Release assets — the
      # public download page. Both matrix legs race to create the release; the
      # loser's create fails harmlessly (|| true) and both then upload their own
      # platform's files (--clobber makes re-runs idempotent). `gh` is
      # preinstalled on all runners; the ambient GITHUB_TOKEN has contents:write
      # (see permissions above). Only user-facing files are attached — installers
      # and zips, not blockmaps/update metadata (the app has no auto-updater).
      - name: Publish installers to the GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > "$RUNNER_TEMP/notes.md" <<'EOF'
          Offline chess studio — school with Viktor, chess.com-grade game review, grandmaster bots with realistic clocks, puzzles, and worldwide P2P multiplayer (share a code, play anyone, anywhere — no account, no port forwarding).

          **Windows:** download `Chess-Setup-*.exe` (installer) or `Chess-Portable-*.exe` (no install).
          **macOS:** download the `.dmg` for your chip (arm64 = Apple Silicon, x64 = Intel).

          Builds are unsigned: Windows SmartScreen → More info → Run anyway; macOS → right-click the app → Open (first launch only). On first run, use Settings → Datasets to import the engine and puzzle database.
          EOF
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "Chess# $GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/notes.md" \
            2>/dev/null || true
          files=$(ls release/*.exe release/*.dmg release/*.zip 2>/dev/null || true)
          [ -n "$files" ] && gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber $files
