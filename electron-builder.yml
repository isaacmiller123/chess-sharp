appId: org.offlinechess.trainer
productName: Offline Chess Trainer
directories:
  output: release
asar: true
files:
  - "out/**"
extraResources:
  # Engine ships now (analysis board uses it). The ~2 GB puzzles.sqlite is added
  # here once the Puzzles UI consumes it, to keep the current exe fast/small:
  #   - { from: "resources/data", to: "data" }
  - from: "resources/engine"
    to: "engine"
  - from: "resources/openings"
    to: "openings"
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: ${productName}-Setup-${version}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
