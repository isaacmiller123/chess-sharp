appId: org.chesssharp.app
productName: Chess#
directories:
  output: release
asar: true
files:
  - "out/**"
extraResources:
  # Lean installer: the heavy datasets (Stockfish engine ~114 MB and the ~2 GB
  # puzzles.sqlite) are NOT bundled. They are imported at runtime from the public
  # GitHub release via Settings -> Datasets (see src/main/datasets), keeping the
  # repo and installer small. Only the tiny, always-on content is bundled below.
  - from: "resources/openings"
    to: "openings"
  - from: "resources/famous"
    to: "famous"
  - from: "resources/curriculum"
    to: "curriculum"
  - from: "resources/personas"
    to: "personas"
win:
  # x64 only — matches the published stockfish-sf18-win-x64 engine artifact and the
  # existing releases. Three artifacts: the NSIS installer, a single-file portable
  # .exe, and a portable .zip (all built on windows-latest in CI). Explicit arch so
  # the build never silently emits an ia32/arm64 binary the engine has no match for.
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: build/icon.ico
  # Fallback for targets without their own block (the win zip): os+arch so the
  # per-platform zips never collide; avoids '#' from productName in paths.
  artifactName: Chess-${version}-${os}-${arch}.${ext}
mac:
  # Same lean model as Windows: the engine + puzzle DB are imported at runtime,
  # not bundled, so the .dmg/.zip stay small. arm64 (Apple Silicon) + x64 (Intel).
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  category: public.app-category.board-games
  # Local/unsigned build: spawning the imported Stockfish binary requires the
  # hardened runtime OFF (or an allow-jit entitlement). Distribution to other
  # Macs needs a Developer ID identity + notarization — set identity then.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  # Fallback for the mac zip target (dmg has its own block below).
  artifactName: Chess-${version}-${os}-${arch}.${ext}
dmg:
  artifactName: Chess-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  # Artifact names avoid the '#' in productName ("Chess#") — it breaks shell paths
  # and needs %23 URL-encoding on download links.
  artifactName: Chess-Setup-${version}.${ext}
portable:
  artifactName: Chess-Portable-${version}.${ext}
