# coturn config for Chess# (deploy/docker-compose.prod.yml runs coturn with
# network_mode: host so the relay UDP port range is reachable). Values with
# ${VAR} are substituted from .env.production by the compose `command`/entrypoint
# wrapper (see docker-compose.prod.yml — it renders this via envsubst on start).
#
# Auth model: long-term credential (lt-cred-mech) with a single user "chess".
# The password is baked into the app's VITE_ICE_SERVERS at build time, so the
# browser presents it automatically. Rotate by rebuilding the web image + this.

listening-port=3478
# Listen on all interfaces (host networking); advertise the real public IP as
# the relay address so remote peers get reachable candidates.
listening-ip=0.0.0.0
external-ip=${EXTERNAL_IP}
relay-ip=${EXTERNAL_IP}

# Long-term credential mechanism + the single app user.
lt-cred-mech
user=chess:${TURN_PASSWORD}
realm=turn.${DOMAIN}

# Relay port range for allocations. 20k ports comfortably supports many
# thousands of concurrent relayed sessions; widen for more. Open this UDP range
# in the VPS firewall/security-group along with 3478/5349 (udp+tcp).
min-port=49160
max-port=65535

# TLS for turns:// on 5349 (HARDENING — lets clients behind port-443-only
# corporate firewalls relay). Disabled by default so coturn always boots with no
# cert present. To enable: obtain a cert for turn.${DOMAIN} (certbot, or copy
# Caddy's), mount it into the coturn container at /certs, and uncomment:
#   tls-listening-port=5349
#   cert=/certs/turn.${DOMAIN}.crt
#   pkey=/certs/turn.${DOMAIN}.key
# The app already lists turns:5349 in VITE_ICE_SERVERS; ICE silently skips it
# until this is live, so enabling later needs no app rebuild.

# Hardening: no admin CLI, no loopback/multicast relaying, drop obviously bogus
# peer ranges. (Do NOT set allow-loopback-peers in production — that is a
# local-test-only flag.)
no-cli
no-multicast-peers
no-tlsv1
no-tlsv1_1
# Deny relaying to private/internal ranges (SSRF hardening).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
